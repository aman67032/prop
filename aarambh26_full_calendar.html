const MONTHS = [
  {year:2026, month:4, label:"May 2026"},
  {year:2026, month:5, label:"June 2026"},
  {year:2026, month:6, label:"July 2026"},
];

const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}

function buildCal(containerId, data){
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  MONTHS.forEach(({year, month, label}) => {
    const block = document.createElement("div");
    block.className = "month-block";
    const lbl = document.createElement("div");
    lbl.className = "month-label";
    lbl.textContent = label;
    block.appendChild(lbl);
    const grid = document.createElement("div");
    grid.className = "cal-grid";
    DAYS.forEach(d => {
      const dn = document.createElement("div");
      dn.className = "day-name";
      dn.textContent = d;
      grid.appendChild(dn);
    });
    const first = new Date(year, month, 1).getDay();
    for(let i=0;i<first;i++){
      const empty = document.createElement("div");
      empty.className = "day empty";
      grid.appendChild(empty);
    }
    const days = new Date(year, month+1, 0).getDate();
    for(let d=1;d<=days;d++){
      const key = dateKey(year, month, d);
      const items = data[key] || [];
      const cell = document.createElement("div");
      cell.className = "day" + (items.length ? " has-item" : "");
      const num = document.createElement("div");
      num.className = "day-num";
      num.textContent = d;
      cell.appendChild(num);
      items.forEach(item => {
        const wrap = document.createElement("div");
        wrap.className = "tooltip-wrap";
        const chip = document.createElement("span");
        chip.className = "chip " + item.c;
        chip.textContent = item.t;
        wrap.appendChild(chip);
        if(item.tt){
          const tt = document.createElement("div");
          tt.className = "tt";
          tt.innerHTML = `<strong>${item.t}</strong>${item.tt}`;
          wrap.appendChild(tt);
        }
        cell.appendChild(wrap);
      });
      grid.appendChild(cell);
    }
    block.appendChild(grid);
    el.appendChild(block);
  });
}

function switchTab(tab){
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById("view-tasks").style.display = tab==="tasks" ? "block" : "none";
  document.getElementById("view-meetings").style.display = tab==="meetings" ? "block" : "none";
}
